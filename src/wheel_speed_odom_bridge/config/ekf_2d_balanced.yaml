# robot_localization 2D EKF 配置：均衡模式
# 思路：
# 1. odom 使用前向线速度 vx
# 2. odom 同时提供角速度 vyaw
# 3. imu 只提供角速度 wz
# 适合 odom 的角速度还比较可信，但又不想直接把 odom pose 喂进 EKF 的情况。

frequency: 50
sensor_timeout: 0.1
two_d_mode: true
publish_tf: false
publish_acceleration: false
predict_to_current_time: true
transform_time_offset: 0.0
transform_timeout: 0.0
print_diagnostics: false

odom_frame: odom
base_link_frame: base_footprint
world_frame: odom

odom0: /odom_raw
odom0_queue_size: 20
odom0_nodelay: true
odom0_differential: false
odom0_relative: false
odom0_config: [false, false, false,
               false, false, false,
               true,  false, false,
               false, false, true,
               false, false, false]

imu0: /imu_corrected
imu0_queue_size: 50
imu0_nodelay: true
imu0_differential: false
imu0_relative: false
imu0_remove_gravitational_acceleration: false
imu0_config: [false, false, false,
              false, false, false,
              false, false, false,
              false, false, true,
              false, false, false]
