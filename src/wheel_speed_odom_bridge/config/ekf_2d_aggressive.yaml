# robot_localization 2D EKF 配置：激进模式
# 思路：
# 1. 直接融合 odom 的 x / y / yaw
# 2. 同时融合 odom 的 vx / vyaw
# 3. imu 只提供角速度 wz
# 适合原始轮式里程计本身质量较高，希望 EKF 结果更贴近轮式轨迹的场景。

frequency: 50
sensor_timeout: 0.1
two_d_mode: true
publish_tf: false
publish_acceleration: false
predict_to_current_time: true
transform_time_offset: 0.0
transform_timeout: 0.0
print_diagnostics: false

odom_frame: odom
base_link_frame: base_footprint
world_frame: odom

odom0: /odom_raw
odom0_queue_size: 20
odom0_nodelay: true
odom0_differential: false
odom0_relative: false
odom0_config: [true,  true,  false,
               false, false, true,
               true,  false, false,
               false, false, true,
               false, false, false]

imu0: /imu_corrected
imu0_queue_size: 50
imu0_nodelay: true
imu0_differential: false
imu0_relative: false
imu0_remove_gravitational_acceleration: false
imu0_config: [false, false, false,
              false, false, false,
              false, false, false,
              false, false, true,
              false, false, false]
