footprint: [[-0.525, -0.435], [0.525, -0.435], [0.525, 0.435], [-0.525, 0.435]]
footprint_padding: 0.05

transform_tolerance: 1.0

max_obstacle_height: 1.2
min_obstacle_height: 0.0

obstacle_layer:
  enabled: true
  obstacle_range: 2.5
  raytrace_range: 3.0
  track_unknown_space: true
  combination_method: 1
  observation_sources: laser_scan_sensor left_cam_source right_cam_source up_cam_source

  laser_scan_sensor:
    data_type: LaserScan
    topic: /scan
    marking: true
    clearing: true
    inf_is_valid: true

  left_cam_source:
    data_type: PointCloud2
    topic: /left/obstacle_2d
    marking: true
    clearing: true
    min_obstacle_height: -0.5
    max_obstacle_height: 2.0
    obstacle_range: 2.5
    raytrace_range: 3.0

  right_cam_source:
    data_type: PointCloud2
    topic: /right/obstacle_2d
    marking: true
    clearing: true
    min_obstacle_height: -0.5
    max_obstacle_height: 2.0
    obstacle_range: 2.5
    raytrace_range: 3.0

  up_cam_source:
    data_type: PointCloud2
    topic: /up/obstacle_2d
    marking: true
    clearing: true
    min_obstacle_height: -0.5
    max_obstacle_height: 2.0
    obstacle_range: 2.5
    raytrace_range: 3.0

inflation_layer:
  enabled: true
  cost_scaling_factor: 5.0
  inflation_radius: 0.6

keepout_constraint_layer:
  enabled: true
  constraints_topic: /map_constraints/current

static_layer:
  enabled: true
  map_topic: map
